# Render.com Blueprint — deploys this app as a free web service.
# Render auto-detects this file when you create a "Blueprint" from the repo.
services:
  - type: web
    name: insight-engine
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python generate_sample.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # secret — you enter it in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.8"
